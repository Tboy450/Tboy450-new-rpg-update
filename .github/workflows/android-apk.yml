name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/android-apk.yml"
      - "buildozer.spec"
      - "main.py"
      - "requirements.txt"
      - "assets/**"
      - "game_data/**"
      - "p4a-recipes/**"
      - "systems/**"
      - "scripts/build_android.sh"

permissions:
  contents: write

jobs:
  android-debug-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk python3-pip python3-venv \
            autoconf automake libtool libltdl-dev pkg-config zlib1g-dev \
            libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev \
            build-essential

      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install buildozer Cython==0.29.36

      - name: Build Android debug APK
        env:
          ANDROID_ACCEPT_SDK_LICENSES: "1"
          PIP_BREAK_SYSTEM_PACKAGES: "1"
        run: |
          bash scripts/build_android.sh
          ls -lh bin/dragons-lair-rpg-android-debug.apk

      - name: Publish Android APK release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-latest
          name: Latest Android Debug APK
          body: |
            Latest automatically built Android debug APK for Dragon's Lair RPG.

            Install link:
            https://github.com/${{ github.repository }}/releases/download/android-latest/dragons-lair-rpg-android-debug.apk
          prerelease: true
          make_latest: true
          files: bin/dragons-lair-rpg-android-debug.apk
          overwrite_files: true
